<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — QuimCalc</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <header class="header">
    <div class="contenedor">
      <div class="header__inner">
        <a href="/" class="header__logo">Quim<span>Calc</span></a>
      </div>
    </div>
  </header>

  <main>
    <div class="contenedor" style="padding: var(--espacio-2xl) var(--espacio-lg); text-align: center;">

      <!-- Ícono sin red -->
      <div style="font-size: 4rem; margin-bottom: var(--espacio-lg);">📡</div>

      <h1 style="font-family: var(--fuente-titulo); font-size: 2rem; font-style: italic; margin-bottom: var(--espacio-md);">
        Sin conexión
      </h1>

      <p style="color: var(--color-texto-suave); max-width: 480px; margin: 0 auto var(--espacio-xl);">
        No hay conexión a internet en este momento. Las calculadoras que ya visitaste antes deberían seguir funcionando — probá desde la pantalla de inicio.
      </p>

      <a href="/" class="btn btn--primario" style="max-width: 260px; margin: 0 auto;">
        ← Ir al inicio
      </a>

    </div>
  </main>

  <footer class="footer">
    <div class="contenedor">
      <div class="footer__inner">
        <p class="footer__texto">© 2026 QuimCalc — Herramientas para laboratorio químico, Argentina.</p>
      </div>
    </div>
  </footer>

</body>
</html>
